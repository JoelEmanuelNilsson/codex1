#:schema https://developers.openai.com/codex/config-schema.json

model = "gpt-5.4"
review_model = "gpt-5.4-mini"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "high"

[features]
codex_hooks = true

[agents]
max_threads = 16
max_depth = 1

[profiles.codex1_helper]
model = "gpt-5.4-mini"
model_reasoning_effort = "high"

[profiles.codex1_spark]
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "high"

[profiles.codex1_coder]
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"

# Uncomment only when setup installs skills outside the default .codex/skills
# location and must bridge them explicitly.
# [[skills.config]]
# path = "{{SKILLS_BRIDGE_PATH}}"
# enabled = true
